<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #ffffff; color: #2f2f2f; }
        .container { max-width: 400px; margin: auto; border: 1px solid #e0e0e0; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #edebf0; border-radius: 8px; box-sizing: border-box; outline: none; transition: border-color 0.2s; font-size: 16px; }
        input:focus { border-color: #7b68ee; }
        .result-label { margin-top: 20px; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .result-box { background: #f4f4f9; border-radius: 8px; padding: 15px; margin-top: 5px; border: 1px dashed #7b68ee; display: flex; align-items: center; justify-content: space-between; }
        #output { font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; color: #7b68ee; word-break: break-all; }
        .hint { font-size: 11px; color: #999; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <label>Enter Name or Email</label>
        <input type="text" id="userInput" placeholder="e.g. srybkowskitesting" oninput="formatLogin()">
        
        <div class="result-label">Required Login:</div>
        <div class="result-box">
            <span id="output">.\</span>
        </div>
        
        <p class="hint">
            <strong>Logic:</strong> Truncates name to 13 chars to fit the 20-char limit including <code>_amelco</code>.
        </p>
    </div>

    <script>
        function formatLogin() {
            const input = document.getElementById('userInput').value;
            const suffix = "_amelco";
            const limit = 20;
            const maxNameLength = limit - suffix.length; // 13 characters

            // 1. Strip email domain if they paste a full email
            let cleanName = input.split('@')[0];
            
            // 2. Cut the name at 13 chars
            let truncatedName = cleanName.substring(0, maxNameLength);
            
            // 3. Combine
            let finalLogin = ".\\" + truncatedName + suffix;
            
            document.getElementById('output').innerText = input ? finalLogin : ".\\";
        }
    </script>
</body>
</html>
