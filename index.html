<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .result-box { background: #eef2ff; border-left: 4px solid #7b68ee; padding: 15px; margin-top: 10px; }
        label { font-weight: bold; color: #333; }
        .hint { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <label>Paste Email or Username:</label>
    <input type="text" id="userInput" placeholder="e.g. srybkowskitestinglongemail" oninput="formatLogin()">
    
    <div class="result-box">
        <label>Your Login:</label>
        <div id="output" style="font-family: monospace; font-size: 1.2em; margin-top: 5px;">.\</div>
    </div>
    <p class="hint">Note: Logins are capped at 20 characters.</p>

    <script>
        function formatLogin() {
            const input = document.getElementById('userInput').value;
            // Remove email domain if present
            let cleanName = input.split('@')[0];
            // Trim to 20 characters and add prefix
            let formatted = ".\\" + cleanName.substring(0, 20);
            document.getElementById('output').innerText = formatted;
        }
    </script>
</body>
</html>
